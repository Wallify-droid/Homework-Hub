<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostHub</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: #2a2a2a;
  --text: #f1f1f1;
  --text2: #aaa;
  --text3: #666;
  --accent: #3ea6ff;
  --accent-hover: #65b8ff;
  --red: #ff4444;
  --radius: 8px;
  --nav-h: 56px;
  --sidebar-w: 240px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 200;
  border-bottom: 1px solid var(--border);
}

.topbar-logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  min-width: 130px;
}

.topbar-logo span {
  color: var(--accent);
}

.topbar-search {
  flex: 1;
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 40px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.topbar-search:focus-within {
  border-color: var(--accent);
}

.topbar-search input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 8px 18px;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
}

.topbar-search input::placeholder { color: var(--text3); }

.topbar-search button {
  background: var(--surface2);
  border: none;
  border-left: 1px solid var(--border);
  padding: 0 18px;
  cursor: pointer;
  color: var(--text2);
  font-size: 15px;
  transition: background 0.2s;
}

.topbar-search button:hover { background: var(--border); }

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.btn-upload-top {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 14px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}

.btn-upload-top:hover { background: var(--border); }

/* ── LAYOUT ── */
.layout {
  display: flex;
  margin-top: var(--nav-h);
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  min-height: calc(100vh - var(--nav-h));
  position: fixed;
  top: var(--nav-h);
  left: 0;
  background: var(--bg);
  padding: 12px 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 100;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 16px;
  cursor: pointer;
  border-radius: 6px;
  margin: 0 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
}

.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active { background: var(--surface2); color: var(--text); }

.sidebar-icon { font-size: 18px; width: 22px; text-align: center; }

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 12px 0;
}

.sidebar-section-title {
  padding: 6px 20px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* ── MAIN CONTENT ── */
.main {
  margin-left: var(--sidebar-w);
  padding: 24px;
  flex: 1;
  min-width: 0;
}

/* Category chips */
.chips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 20px;
  scrollbar-width: none;
}

.chips::-webkit-scrollbar { display: none; }

.chip {
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 40px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  user-select: none;
}

.chip:hover { background: var(--surface2); color: var(--text); }
.chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px 12px;
}

/* Post Card */
.card {
  cursor: pointer;
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform 0.15s;
}

.card:hover { transform: translateY(-2px); }
.card:hover .card-thumb { box-shadow: 0 4px 20px rgba(0,0,0,0.6); }

.card-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow 0.2s;
}

.card-thumb-preview {
  width: 100%;
  height: 100%;
  border: none;
  pointer-events: none;
  transform-origin: top left;
  overflow: hidden;
}

.card-thumb-icon {
  font-size: 40px;
  opacity: 0.25;
}

.card-type-badge {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0,0,0,0.75);
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  backdrop-filter: blur(4px);
}

.card-info {
  padding: 10px 4px 4px;
  display: flex;
  gap: 10px;
}

.card-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
  text-transform: uppercase;
}

.card-meta {
  flex: 1;
  min-width: 0;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 3px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-author {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 2px;
}

.card-time {
  font-size: 12px;
  color: var(--text3);
}

/* Empty / Loading */
.state-msg {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}

.state-msg .ico { font-size: 52px; margin-bottom: 12px; opacity: 0.4; }
.state-msg p { font-size: 15px; }

.spinner-wrap {
  grid-column: 1/-1;
  display: flex;
  justify-content: center;
  padding: 60px;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── VIEWER MODAL ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 300;
  display: none;
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  padding: 20px;
}

.overlay.open { display: flex; }

.viewer {
  background: var(--surface);
  border-radius: 10px;
  width: 100%;
  max-width: 900px;
  margin: auto;
  overflow: hidden;
  border: 1px solid var(--border);
}

.viewer-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}

.viewer-title {
  font-size: 15px;
  font-weight: 600;
  flex: 1;
  margin-right: 12px;
}

.viewer-close {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}

.viewer-close:hover { background: var(--border); }

.viewer-frame-wrap {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  position: relative;
}

.viewer-frame-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

.viewer-text-only {
  padding: 40px 32px;
  font-size: 16px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  word-wrap: break-word;
  min-height: 200px;
}

.viewer-meta {
  padding: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
}

.viewer-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  flex-shrink: 0;
}

.viewer-author { font-size: 14px; font-weight: 600; }
.viewer-date { font-size: 12px; color: var(--text3); margin-top: 2px; }

.viewer-body { padding: 0 20px 20px; }
.viewer-body-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text2);
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── UPLOAD MODAL ── */
.upload-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 400;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.upload-overlay.open { display: flex; }

.upload-modal {
  background: var(--surface);
  border-radius: 10px;
  width: 100%;
  max-width: 520px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.upload-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}

.upload-header h2 { font-size: 16px; font-weight: 600; }

.upload-body { padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }

.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 7px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.field input, .field textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  transition: border-color 0.2s;
}

.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field input::placeholder, .field textarea::placeholder { color: var(--text3); }
.field textarea { resize: vertical; min-height: 90px; }

.dropzone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  color: var(--text2);
}

.dropzone:hover, .dropzone.drag { border-color: var(--accent); background: rgba(62,166,255,0.05); }

.dropzone .dz-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.6; }
.dropzone .dz-label { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.dropzone .dz-sub { font-size: 12px; color: var(--text3); }

.dz-selected {
  border-color: var(--accent);
  background: rgba(62,166,255,0.05);
  color: var(--accent);
}

.dz-selected .dz-icon { opacity: 1; }

.upload-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.btn {
  padding: 9px 20px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  font-family: inherit;
}

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}

.btn-ghost:hover { background: var(--surface2); color: var(--text); }

.btn-primary {
  background: var(--accent);
  color: #000;
}

.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

/* Toast */
.toast-wrap {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
}

.toast {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  animation: toastIn 0.25s ease-out;
  max-width: 280px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.toast.ok { border-left: 3px solid #3ecf8e; }
.toast.err { border-left: 3px solid var(--red); }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Progress bar */
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.3s;
}

/* Mobile adjustments */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 12px; }
  .topbar-search { display: none; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .viewer-text-only { padding: 20px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="topbar-logo" href="#"><span>▶</span>PostHub</a>
  <div class="topbar-search">
    <input type="text" id="searchInput" placeholder="Search posts…" oninput="handleSearch()">
    <button>🔍</button>
  </div>
  <div class="topbar-actions">
    <button class="btn-upload-top" onclick="openUpload()">
      + Create
    </button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-item active" onclick="setFilter('all', this)">
      <span class="sidebar-icon">🏠</span> Home
    </div>
    <div class="sidebar-item" onclick="setFilter('html', this)">
      <span class="sidebar-icon">🌐</span> HTML Posts
    </div>
    <div class="sidebar-item" onclick="setFilter('text', this)">
      <span class="sidebar-icon">📝</span> Text Posts
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-title">Browse</div>
    <div class="sidebar-item" onclick="openUpload()">
      <span class="sidebar-icon">＋</span> Upload
    </div>
    <div class="sidebar-item" onclick="loadPosts(true)">
      <span class="sidebar-icon">↺</span> Refresh
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Chips -->
    <div class="chips" id="chips">
      <div class="chip active" onclick="chipFilter('all', this)">All</div>
      <div class="chip" onclick="chipFilter('html', this)">HTML Files</div>
      <div class="chip" onclick="chipFilter('text', this)">Text Only</div>
    </div>

    <!-- Grid -->
    <div class="grid" id="grid">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<!-- VIEWER OVERLAY -->
<div class="overlay" id="viewerOverlay" onclick="overlayClickClose(event, 'viewerOverlay')">
  <div class="viewer" id="viewer">
    <div class="viewer-topbar">
      <div class="viewer-title" id="viewerTitle">–</div>
      <button class="viewer-close" onclick="closeViewer()">✕</button>
    </div>
    <div id="viewerContent"></div>
    <div class="viewer-meta">
      <div class="viewer-avatar" id="viewerAvatar">?</div>
      <div>
        <div class="viewer-author" id="viewerAuthor">–</div>
        <div class="viewer-date" id="viewerDate">–</div>
      </div>
    </div>
    <div class="viewer-body" id="viewerBody"></div>
  </div>
</div>

<!-- UPLOAD OVERLAY -->
<div class="upload-overlay" id="uploadOverlay" onclick="overlayClickClose(event, 'uploadOverlay')">
  <div class="upload-modal">
    <div class="upload-header">
      <h2>Create Post</h2>
      <button class="viewer-close" onclick="closeUpload()">✕</button>
    </div>
    <div class="upload-body">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="inputName" placeholder="e.g. Momin" maxlength="30">
      </div>
      <div class="field">
        <label>Post Title</label>
        <input type="text" id="inputTitle" placeholder="Give your post a title…" maxlength="80">
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="inputDesc" placeholder="What's this about? (optional)" maxlength="500"></textarea>
      </div>
      <div class="field">
        <label>HTML File <span style="color:var(--text3);font-weight:400;text-transform:none">(optional)</span></label>
        <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()"
             ondragover="dzDragOver(event)" ondragleave="dzDragLeave()" ondrop="dzDrop(event)">
          <div class="dz-icon">📁</div>
          <div class="dz-label">Drop HTML file or click to browse</div>
          <div class="dz-sub">Only .html files, max 5 MB</div>
          <div class="progress-bar" id="dzProgress" style="display:none;">
            <div class="progress-bar-fill" id="dzFill"></div>
          </div>
        </div>
        <input type="file" id="fileInput" accept=".html" style="display:none" onchange="fileChosen(event)">
      </div>
    </div>
    <div class="upload-footer">
      <button class="btn btn-ghost" onclick="closeUpload()">Cancel</button>
      <button class="btn btn-primary" id="publishBtn" onclick="publishPost()">Publish</button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
const SB_URL = 'https://nzolsmouyulzqeaocejm.supabase.co';
const SB_KEY = 'sb_publishable_EGX3jDjRh5LiXjdTw2AXxA_e1YIaP4Q';
const BUCKET  = 'homework-files';
const TABLE   = 'homework';

let allPosts = [];
let activeFilter = 'all';
let searchQuery  = '';
let selectedFile = null;

// ── INIT ──────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadPosts();
  setInterval(loadPosts, 8000);
});

// ── LOAD POSTS ────────────────────────
async function loadPosts(showSpinner = false) {
  if (showSpinner) {
    document.getElementById('grid').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  }
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?order=created_at.desc`, {
      headers: { apikey: SB_KEY }
    });
    if (!r.ok) throw new Error();
    allPosts = await r.json();
    renderGrid();
  } catch {
    if (allPosts.length === 0) {
      document.getElementById('grid').innerHTML = `
        <div class="state-msg"><div class="ico">📭</div><p>No posts yet — be the first to publish!</p></div>`;
    }
  }
}

// ── RENDER GRID ───────────────────────
function renderGrid() {
  let posts = allPosts;

  if (activeFilter === 'html') posts = posts.filter(p => p.file_url);
  if (activeFilter === 'text') posts = posts.filter(p => !p.file_url);

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    posts = posts.filter(p =>
      (p.title||'').toLowerCase().includes(q) ||
      (p.subject||'').toLowerCase().includes(q)
    );
  }

  const grid = document.getElementById('grid');

  if (posts.length === 0) {
    grid.innerHTML = `<div class="state-msg"><div class="ico">🔍</div><p>Nothing to show here.</p></div>`;
    return;
  }

  grid.innerHTML = posts.map(p => cardHTML(p)).join('');
}

function cardHTML(p) {
  const author = (p.title || 'Anonymous').split(' ')[0];
  const initial = author[0].toUpperCase();
  const subjectPreview = (p.subject || '').slice(0, 80);
  const hasFile = !!p.file_url;
  const timeStr = timeAgo(p.created_at);

  const thumb = hasFile
    ? `<iframe class="card-thumb-preview" src="${p.file_url}" sandbox="allow-scripts allow-same-origin" scrolling="no"></iframe>`
    : `<div class="card-thumb-icon">📝</div>`;

  return `
    <div class="card" onclick='openViewer(${JSON.stringify(p)})'>
      <div class="card-thumb">
        ${thumb}
        <div class="card-type-badge">${hasFile ? 'HTML' : 'POST'}</div>
      </div>
      <div class="card-info">
        <div class="card-avatar">${initial}</div>
        <div class="card-meta">
          <div class="card-title">${esc(p.subject || p.title || 'Untitled')}</div>
          <div class="card-author">${esc(p.title || 'Anonymous')}</div>
          <div class="card-time">${timeStr}</div>
        </div>
      </div>
    </div>`;
}

// ── VIEWER ────────────────────────────
function openViewer(p) {
  const author = p.title || 'Anonymous';
  document.getElementById('viewerTitle').textContent  = p.subject || p.title || 'Post';
  document.getElementById('viewerAvatar').textContent = author[0].toUpperCase();
  document.getElementById('viewerAuthor').textContent = author;
  document.getElementById('viewerDate').textContent   = new Date(p.created_at).toLocaleString();

  const content = document.getElementById('viewerContent');
  if (p.file_url) {
    content.innerHTML = `
      <div class="viewer-frame-wrap">
        <iframe src="${p.file_url}" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
      </div>`;
  } else {
    content.innerHTML = `<div class="viewer-text-only">${esc(p.subject || '')}</div>`;
  }

  const bodyEl = document.getElementById('viewerBody');
  if (p.file_url && p.subject) {
    bodyEl.innerHTML = `<div class="viewer-body-text">${esc(p.subject)}</div>`;
  } else {
    bodyEl.innerHTML = '';
  }

  document.getElementById('viewerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeViewer() {
  document.getElementById('viewerOverlay').classList.remove('open');
  document.getElementById('viewerContent').innerHTML = '';
  document.body.style.overflow = '';
}

// ── UPLOAD MODAL ──────────────────────
function openUpload()  { document.getElementById('uploadOverlay').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeUpload() {
  document.getElementById('uploadOverlay').classList.remove('open');
  document.body.style.overflow = '';
  resetUploadForm();
}

function resetUploadForm() {
  document.getElementById('inputName').value  = '';
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputDesc').value  = '';
  document.getElementById('fileInput').value  = '';
  selectedFile = null;
  const dz = document.getElementById('dropzone');
  dz.className = 'dropzone';
  dz.querySelector('.dz-icon').textContent  = '📁';
  dz.querySelector('.dz-label').textContent = 'Drop HTML file or click to browse';
  dz.querySelector('.dz-sub').textContent   = 'Only .html files, max 5 MB';
  document.getElementById('dzProgress').style.display = 'none';
}

// ── DROPZONE ──────────────────────────
function fileChosen(e) {
  handleFile(e.target.files[0]);
}

function dzDragOver(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.add('drag');
}

function dzDragLeave() {
  document.getElementById('dropzone').classList.remove('drag');
}

function dzDrop(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('drag');
  handleFile(e.dataTransfer.files[0]);
}

function handleFile(file) {
  if (!file) return;
  if (!file.name.endsWith('.html')) { toast('Only .html files are allowed', 'err'); return; }
  if (file.size > 5 * 1024 * 1024) { toast('File too large (max 5 MB)', 'err'); return; }
  selectedFile = file;
  const dz = document.getElementById('dropzone');
  dz.classList.add('dz-selected');
  dz.querySelector('.dz-icon').textContent  = '✅';
  dz.querySelector('.dz-label').textContent = file.name;
  dz.querySelector('.dz-sub').textContent   = (file.size / 1024).toFixed(1) + ' KB';
}

// ── PUBLISH ───────────────────────────
async function publishPost() {
  const name  = document.getElementById('inputName').value.trim();
  const title = document.getElementById('inputTitle').value.trim();
  const desc  = document.getElementById('inputDesc').value.trim();

  if (!name)  { toast('Enter your name', 'err'); return; }
  if (!title && !desc && !selectedFile) { toast('Add a title, description, or file', 'err'); return; }

  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.textContent = 'Publishing…';

  try {
    let fileUrl = null;

    if (selectedFile) {
      fileUrl = await uploadFile(selectedFile);
    }

    const displayTitle = title || desc.slice(0, 60) || selectedFile?.name || 'Post';
    const content      = desc || title;

    const r = await fetch(`${SB_URL}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: {
        apikey: SB_KEY,
        'Content-Type': 'application/json',
        Prefer: 'return=minimal'
      },
      body: JSON.stringify({
        title: `${name} — ${displayTitle}`,
        subject: content,
        file_url: fileUrl
      })
    });

    if (!r.ok) throw new Error();

    toast('Post published!', 'ok');
    closeUpload();
    await loadPosts();

  } catch {
    toast('Failed to publish', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Publish';
  }
}

async function uploadFile(file) {
  const fileName = `${Date.now()}_${file.name}`;

  // Show progress bar
  const prog = document.getElementById('dzProgress');
  const fill = document.getElementById('dzFill');
  prog.style.display = 'block';

  // Fake progress for UX
  let pct = 0;
  const tick = setInterval(() => {
    pct = Math.min(pct + 8, 85);
    fill.style.width = pct + '%';
  }, 120);

  const fd = new FormData();
  fd.append('file', file);

  const r = await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${fileName}`, {
    method: 'POST',
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`
    },
    body: fd
  });

  clearInterval(tick);
  fill.style.width = '100%';

  if (!r.ok) throw new Error('File upload failed');

  return `${SB_URL}/storage/v1/object/public/${BUCKET}/${fileName}`;
}

// ── FILTERS ───────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  // sync chips
  const map = { all: 0, html: 1, text: 2 };
  document.querySelectorAll('.chip').forEach((c, i) => {
    c.classList.toggle('active', i === map[f]);
  });
  renderGrid();
}

function chipFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function handleSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  renderGrid();
}

// ── OVERLAY CLOSE ON BG CLICK ─────────
function overlayClickClose(e, id) {
  if (e.target.id === id) {
    if (id === 'viewerOverlay') closeViewer();
    else closeUpload();
  }
}

// ── HELPERS ───────────────────────────
function timeAgo(iso) {
  const d = new Date(iso);
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 604800) return Math.floor(s/86400) + 'd ago';
  return d.toLocaleDateString();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = (type === 'ok' ? '✓ ' : '✕ ') + msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
</script>
